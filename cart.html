<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>購物車 | 商店</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }

header {
  background: #2d89ef;
  color: white;
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header a { color: white; text-decoration: none; font-size: 14px; }

.container {
  max-width: 560px;
  margin: 40px auto;
  background: white;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  padding: 32px;
}

h2 { font-size: 20px; margin-bottom: 24px; }

.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid #eee;
}
.cart-item .name { font-size: 16px; }
.cart-item .price { color: #2d89ef; font-weight: bold; font-size: 18px; }

.total {
  display: flex;
  justify-content: space-between;
  padding: 20px 0;
  font-size: 18px;
  font-weight: bold;
}

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
.form-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
}

button {
  width: 100%;
  background: #28a745;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  margin-top: 8px;
}
button:hover { background: #1e7e34; }

.empty { text-align: center; color: #888; padding: 40px 0; }
.back { display: inline-block; margin-top: 16px; color: #2d89ef; text-decoration: none; font-size: 14px; }
</style>
</head>
<body>

<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N6FVFZ2G"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<header>
  <a href="index.html">← 回首頁</a>
  <span style="color:white;font-size:16px;">🛒 購物車</span>
</header>

<div class="container">
  <h2>訂單確認</h2>

  <div id="cartContent"></div>

  <a href="index.html" class="back">← 繼續購物</a>
</div>

<script>
window.dataLayer = window.dataLayer || [];

const cart = JSON.parse(localStorage.getItem('cart_item') || 'null');
const container = document.getElementById('cartContent');
const params = new URLSearchParams(window.location.search);

if (!cart) {
  container.innerHTML = '<div class="empty">購物車是空的 😢</div>';
} else {
  container.innerHTML = `
    <div class="cart-item">
      <span class="name">${cart.name}</span>
      <span class="price">NT$${cart.price}</span>
    </div>
    <div class="total">
      <span>總計</span>
      <span>NT$${cart.price}</span>
    </div>
    <div class="form-group">
      <label>姓名</label>
      <input type="text" placeholder="請輸入姓名" id="userName">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="請輸入 Email" id="userEmail">
    </div>
    <button onclick="checkout()">確認付款</button>
  `;
}

function checkout() {
  const name = document.getElementById('userName').value || '訪客';

  dataLayer.push({
    event: 'purchase',
    ecommerce: {
      transaction_id: 'TXN-' + Date.now(),
      value: cart.price,
      currency: 'TWD',
      items: [{
        item_id: cart.id,
        item_name: cart.name,
        price: cart.price,
        quantity: 1
      }]
    }
  });

  const utm = window.location.search;
  window.location = 'thankyou.html?name=' + encodeURIComponent(name) + '&product=' + encodeURIComponent(cart.name) + '&price=' + cart.price + utm.replace('?','&');
}
</script>

</body>
</html>
